<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>
  <!-- Left brain lobe -->
  <path fill="none" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"
    d="M16 10 C14.5 10 12 10.5 10.5 12.5 C9 14.5 9 17 10 18.5 C10.8 19.7 12 20.5 13 21"/>
  <!-- Right brain lobe -->
  <path fill="none" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"
    d="M16 10 C17.5 10 20 10.5 21.5 12.5 C23 14.5 23 17 22 18.5 C21.2 19.7 20 20.5 19 21"/>
  <!-- Bottom base connecting both lobes -->
  <path fill="none" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"
    d="M13 21 Q13 23.5 16 23.5 Q19 23.5 19 21"/>
  <!-- Centre fissure -->
  <line x1="16" y1="10" x2="16" y2="23" stroke="white" stroke-width="1.1" stroke-linecap="round" opacity="0.55"/>
  <!-- Left cortex fold -->
  <path fill="none" stroke="white" stroke-width="1.1" stroke-linecap="round" opacity="0.7"
    d="M11.5 14.5 Q13.5 15.5 12.5 18"/>
  <!-- Right cortex fold -->
  <path fill="none" stroke="white" stroke-width="1.1" stroke-linecap="round" opacity="0.7"
    d="M20.5 14.5 Q18.5 15.5 19.5 18"/>
</svg>
